services:
  postgres:
    image: postgres:16-alpine
    container_name: wompi_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-wompi_ecommerce}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: wompi_backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-wompi_ecommerce}
      WOMPI_API_URL: ${WOMPI_API_URL:-https://sandbox.wompi.co/v1}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY}
      WOMPI_INTEGRITY_KEY: ${WOMPI_INTEGRITY_KEY}
      WOMPI_EVENTS_KEY: ${WOMPI_EVENTS_KEY}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
