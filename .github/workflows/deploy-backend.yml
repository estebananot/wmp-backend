name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EC2_HOST: 3.215.133.77
  EC2_USER: ec2-user

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
        chmod 600 ~/.ssh/ec2_key
        ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy to EC2
      run: |
        ssh -i ~/.ssh/ec2_key ${{ env.EC2_USER }}@${{ env.EC2_HOST }} '
          set -e
          if [ ! -d /home/ec2-user/wmp-backend ]; then
            git clone https://github.com/estebananot/wmp-backend.git /home/ec2-user/wmp-backend
          fi
          cd /home/ec2-user/wmp-backend
          git pull origin main
        '
    
    - name: Create .env file
      run: |
        ssh -i ~/.ssh/ec2_key ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "cat > /home/ec2-user/wmp-backend/.env << 'EOF'
        NODE_ENV=production
        PORT=3000
        CORS_ORIGIN=*
        DB_HOST=${{ secrets.DB_HOST }}
        DB_PORT=5432
        DB_USERNAME=${{ secrets.DB_USERNAME }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DB_DATABASE=wompi_ecommerce
        WOMPI_API_URL=https://sandbox.wompi.co/v1
        WOMPI_PUBLIC_KEY=${{ secrets.WOMPI_PUBLIC_KEY }}
        WOMPI_PRIVATE_KEY=${{ secrets.WOMPI_PRIVATE_KEY }}
        WOMPI_INTEGRITY_KEY=${{ secrets.WOMPI_INTEGRITY_KEY }}
        WOMPI_EVENTS_KEY=${{ secrets.WOMPI_EVENTS_KEY }}
        EOF"
    
    - name: Start Docker Compose
      run: |
        ssh -i ~/.ssh/ec2_key ${{ env.EC2_USER }}@${{ env.EC2_HOST }} '
          cd /home/ec2-user/wmp-backend
          docker-compose -f docker-compose.prod.yml down || true
          docker-compose -f docker-compose.prod.yml up -d --build
          docker system prune -f || true
        '
    
    - name: Health Check
      run: |
        sleep 30
        curl -f http://${{ env.EC2_HOST }}:3000/api/health || exit 1
      continue-on-error: true
