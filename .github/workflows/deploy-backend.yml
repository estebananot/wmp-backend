name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
    
    - name: Deploy to EC2
      env:
        PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        HOST: ${{ vars.EC2_HOST }}
        USER: ${{ vars.EC2_USER }}
      run: |
        # Save SSH key
        echo "$PRIVATE_KEY" > private_key.pem
        chmod 600 private_key.pem
        
        # Connect and deploy
        ssh -o StrictHostKeyChecking=no -i private_key.pem $USER@$HOST '
          cd /home/ec2-user/wmp-backend || git clone https://github.com/estebananot/wmp-backend.git /home/ec2-user/wmp-backend
          cd /home/ec2-user/wmp-backend
          git pull origin main
          
          # Create .env file from secrets
          cat > .env << EOL
        NODE_ENV=production
        PORT=3000
        CORS_ORIGIN=*
        DB_HOST=${{ secrets.DB_HOST }}
        DB_PORT=5432
        DB_USERNAME=${{ secrets.DB_USERNAME }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DB_DATABASE=wompi_ecommerce
        WOMPI_API_URL=https://sandbox.wompi.co/v1
        WOMPI_PUBLIC_KEY=${{ secrets.WOMPI_PUBLIC_KEY }}
        WOMPI_PRIVATE_KEY=${{ secrets.WOMPI_PRIVATE_KEY }}
        WOMPI_INTEGRITY_KEY=${{ secrets.WOMPI_INTEGRITY_KEY }}
        WOMPI_EVENTS_KEY=${{ secrets.WOMPI_EVENTS_KEY }}
        EOL
          
          # Deploy with docker-compose
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d --build
          
          # Clean up old images
          docker system prune -f
        '
        
        rm -f private_key.pem
    
    - name: Health Check
      run: |
        sleep 30
        curl -f http://${{ vars.EC2_HOST }}:3000/api/health || exit 1
      continue-on-error: true
